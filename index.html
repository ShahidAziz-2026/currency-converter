<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>

  <!-- ============================================================
       SEO & PAGE DESCRIPTION
       ============================================================ -->
  <meta name="description" content="Fast, elegant currency converter supporting 30+ world currencies. Built by Claude.ai." />
  <meta name="author" content="Claude.ai" />

  <!-- ============================================================
       OPEN GRAPH (Facebook / social preview)
       Place a file called "preview.png" in the same folder as this
       index.html when hosting on GitHub Pages.  It will be shown
       automatically when someone pastes the link into Facebook.
       Recommended image size: 1200 × 630 px.
       ============================================================ -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Currency Converter" />
  <meta property="og:description" content="Fast, elegant currency converter supporting 30+ world currencies. Built by Claude.ai." />
  <meta property="og:image"       content="preview.png" />
  <!-- Replace the URL below with your actual GitHub Pages URL once deployed -->
  <meta property="og:url"         content="https://YOUR-USERNAME.github.io/YOUR-REPO/" />
  <meta property="og:site_name"   content="Currency Converter" />

  <!-- Twitter card (bonus: also used by some link-preview engines) -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Currency Converter" />
  <meta name="twitter:description" content="Fast, elegant currency converter – built by Claude.ai" />
  <meta name="twitter:image"       content="preview.png" />

  <!-- ============================================================
       GOOGLE FONTS  –  Syne (display) + DM Sans (body)
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ============================================================
       STYLES
       ============================================================ -->
  <style>
    /* ── CSS custom properties (design tokens) ─────────────────── */
    :root {
      --bg:        #0a0e1a;        /* deep navy background            */
      --panel:     #111827;        /* card / panel background         */
      --border:    rgba(255,255,255,.07);
      --accent:    #f5c842;        /* golden yellow accent            */
      --accent2:   #e8a020;        /* darker gold for hover           */
      --text:      #f0f4ff;        /* primary text                    */
      --muted:     #6b7280;        /* secondary / label text          */
      --green:     #34d399;        /* positive change indicator       */
      --red:       #f87171;        /* negative change indicator       */
      --radius:    16px;
      --shadow:    0 24px 64px rgba(0,0,0,.5);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;

      /* Subtle grid texture in the background */
      background-image:
        linear-gradient(rgba(245,200,66,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown .6s ease both;
    }
    header .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    header .logo-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    header h1 {
      font-family: var(--font-head);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -.5px;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* ── Main card ──────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 36px 32px 32px;
      animation: fadeUp .7s ease both .1s;
    }

    /* ── Input group ────────────────────────────────────────────── */
    .field-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* Number input */
    .amount-wrap {
      flex: 1;
      position: relative;
    }
    .amount-wrap input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 700;
      padding: 14px 16px;
      outline: none;
      transition: border-color .2s;
    }
    .amount-wrap input:focus {
      border-color: var(--accent);
    }
    /* Hide browser number spinners */
    .amount-wrap input::-webkit-inner-spin-button,
    .amount-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .amount-wrap input[type=number] { -moz-appearance: textfield; }

    /* Currency selector */
    .select-wrap {
      position: relative;
      width: 130px;
      flex-shrink: 0;
    }
    .select-wrap select {
      appearance: none;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 14px 36px 14px 14px;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .select-wrap select:focus { border-color: var(--accent); }
    /* Custom dropdown arrow */
    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 13px;
    }

    /* ── Swap button ─────────────────────────────────────────────── */
    .swap-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -4px 0 20px;
    }
    .swap-btn {
      background: rgba(245,200,66,.12);
      border: 1px solid rgba(245,200,66,.25);
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background .2s, transform .2s;
    }
    .swap-btn:hover {
      background: rgba(245,200,66,.25);
      transform: rotate(180deg);
    }

    /* ── Result display ─────────────────────────────────────────── */
    .result-box {
      background: rgba(245,200,66,.06);
      border: 1px solid rgba(245,200,66,.18);
      border-radius: 12px;
      padding: 22px 20px;
      text-align: center;
      margin-bottom: 24px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .result-amount {
      font-family: var(--font-head);
      font-size: clamp(28px, 7vw, 46px);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      transition: opacity .2s;
    }
    .result-rate {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Loading spinner inside result box */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(245,200,66,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }
    .loading .spinner  { display: block; }
    .loading .result-amount,
    .loading .result-rate { display: none; }

    /* ── Rate info strip ────────────────────────────────────────── */
    .rate-strip {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      padding-top: 16px;
      border-top: 1px solid var(--border);
      gap: 8px;
      flex-wrap: wrap;
    }
    .rate-strip span { display: flex; align-items: center; gap: 4px; }

    /* ── Error message ──────────────────────────────────────────── */
    .error-msg {
      display: none;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .error-msg.show { display: block; }

    /* ── Popular pairs quick-links ──────────────────────────────── */
    .quick-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .quick-pairs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .pair-btn {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .pair-btn:hover {
      background: rgba(245,200,66,.12);
      border-color: rgba(245,200,66,.3);
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 36px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      animation: fadeUp .8s ease both .3s;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Responsive tweaks ──────────────────────────────────────── */
    @media (max-width: 420px) {
      .card { padding: 28px 20px 24px; }
      .input-group { flex-direction: column; }
      .select-wrap { width: 100%; }
    }
  </style>
</head>

<body>

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header>
    <div class="logo-row">
      <div class="logo-icon">💱</div>
      <h1>Currency <span>Converter</span></h1>
    </div>
    <p>Live exchange rates · 30+ currencies · Built by Claude.ai</p>
  </header>

  <!-- ============================================================
       MAIN CONVERTER CARD
       ============================================================ -->
  <div class="card">

    <!-- ── Quick-pair shortcuts ────────────────────────────────── -->
    <p class="quick-label">Popular pairs</p>
    <div class="quick-pairs" id="quickPairs">
      <!-- Populated by JavaScript -->
    </div>

    <!-- ── FROM amount + currency ──────────────────────────────── -->
    <p class="field-label">Amount</p>
    <div class="input-group">
      <div class="amount-wrap">
        <input
          type="number"
          id="amountInput"
          value="1"
          min="0"
          step="any"
          aria-label="Amount to convert"
        />
      </div>
      <div class="select-wrap">
        <select id="fromCurrency" aria-label="From currency">
          <!-- Populated by JavaScript -->
        </select>
      </div>
    </div>

    <!-- ── SWAP button ─────────────────────────────────────────── -->
    <div class="swap-row">
      <button class="swap-btn" id="swapBtn" title="Swap currencies" aria-label="Swap currencies">⇅</button>
    </div>

    <!-- ── TO currency selector ───────────────────────────────── -->
    <p class="field-label">Convert to</p>
    <div class="input-group">
      <div class="select-wrap" style="width:100%">
        <select id="toCurrency" aria-label="To currency">
          <!-- Populated by JavaScript -->
        </select>
      </div>
    </div>

    <!-- ── Error message (shown on API failure) ───────────────── -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- ── Result ──────────────────────────────────────────────── -->
    <div class="result-box" id="resultBox">
      <div class="spinner"></div>
      <div class="result-amount" id="resultAmount">—</div>
      <div class="result-rate"   id="resultRate"></div>
    </div>

    <!-- ── Info strip ──────────────────────────────────────────── -->
    <div class="rate-strip">
      <span>🕐 <span id="lastUpdated">Fetching rates…</span></span>
      <span>Source: <a href="https://www.frankfurter.app" target="_blank" rel="noopener" style="color:var(--accent)">Frankfurter API</a></span>
    </div>

  </div><!-- /.card -->

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer>
    Made with ♥ by <a href="https://claude.ai" target="_blank" rel="noopener">Claude.ai</a>
    · Rates are indicative only
  </footer>

  <!-- ============================================================
       JAVASCRIPT
       ============================================================ -->
  <script>
    /* ──────────────────────────────────────────────────────────────
       CURRENCY DATA
       Full name and flag emoji for each currency code.
    ────────────────────────────────────────────────────────────── */
    const CURRENCIES = {
      USD: { name: "US Dollar",          flag: "🇺🇸" },
      EUR: { name: "Euro",               flag: "🇪🇺" },
      GBP: { name: "British Pound",      flag: "🇬🇧" },
      JPY: { name: "Japanese Yen",       flag: "🇯🇵" },
      CAD: { name: "Canadian Dollar",    flag: "🇨🇦" },
      AUD: { name: "Australian Dollar",  flag: "🇦🇺" },
      CHF: { name: "Swiss Franc",        flag: "🇨🇭" },
      CNY: { name: "Chinese Yuan",       flag: "🇨🇳" },
      INR: { name: "Indian Rupee",       flag: "🇮🇳" },
      BRL: { name: "Brazilian Real",     flag: "🇧🇷" },
      MXN: { name: "Mexican Peso",       flag: "🇲🇽" },
      KRW: { name: "South Korean Won",   flag: "🇰🇷" },
      SEK: { name: "Swedish Krona",      flag: "🇸🇪" },
      NOK: { name: "Norwegian Krone",    flag: "🇳🇴" },
      DKK: { name: "Danish Krone",       flag: "🇩🇰" },
      NZD: { name: "New Zealand Dollar", flag: "🇳🇿" },
      SGD: { name: "Singapore Dollar",   flag: "🇸🇬" },
      HKD: { name: "Hong Kong Dollar",   flag: "🇭🇰" },
      TRY: { name: "Turkish Lira",       flag: "🇹🇷" },
      ZAR: { name: "South African Rand", flag: "🇿🇦" },
      PLN: { name: "Polish Złoty",       flag: "🇵🇱" },
      CZK: { name: "Czech Koruna",       flag: "🇨🇿" },
      HUF: { name: "Hungarian Forint",   flag: "🇭🇺" },
      ILS: { name: "Israeli Shekel",     flag: "🇮🇱" },
      PHP: { name: "Philippine Peso",    flag: "🇵🇭" },
      MYR: { name: "Malaysian Ringgit",  flag: "🇲🇾" },
      THB: { name: "Thai Baht",          flag: "🇹🇭" },
      IDR: { name: "Indonesian Rupiah",  flag: "🇮🇩" },
      AED: { name: "UAE Dirham",         flag: "🇦🇪" },
      SAR: { name: "Saudi Riyal",        flag: "🇸🇦" },
    };

    /* Popular pair shortcuts shown at the top of the card */
    const QUICK_PAIRS = [
      { from: "USD", to: "EUR" },
      { from: "USD", to: "GBP" },
      { from: "USD", to: "JPY" },
      { from: "EUR", to: "GBP" },
      { from: "GBP", to: "CAD" },
    ];

    /* ──────────────────────────────────────────────────────────────
       STATE
    ────────────────────────────────────────────────────────────── */
    let ratesCache = {};   // { EUR: { USD: 1.08, GBP: 0.85, … }, … }
    let fetchTimer  = null; // debounce timer reference

    /* ──────────────────────────────────────────────────────────────
       DOM REFERENCES
    ────────────────────────────────────────────────────────────── */
    const amountInput  = document.getElementById("amountInput");
    const fromSelect   = document.getElementById("fromCurrency");
    const toSelect     = document.getElementById("toCurrency");
    const swapBtn      = document.getElementById("swapBtn");
    const resultBox    = document.getElementById("resultBox");
    const resultAmount = document.getElementById("resultAmount");
    const resultRate   = document.getElementById("resultRate");
    const lastUpdated  = document.getElementById("lastUpdated");
    const errorMsg     = document.getElementById("errorMsg");
    const quickPairs   = document.getElementById("quickPairs");

    /* ──────────────────────────────────────────────────────────────
       BUILD SELECT OPTIONS
       Populates both <select> elements with currency options.
    ────────────────────────────────────────────────────────────── */
    function buildSelects() {
      const codes = Object.keys(CURRENCIES);
      codes.forEach(code => {
        const { name, flag } = CURRENCIES[code];
        const label = `${flag} ${code} – ${name}`;

        // Add option to both selects
        [fromSelect, toSelect].forEach(sel => {
          const opt = document.createElement("option");
          opt.value       = code;
          opt.textContent = label;
          sel.appendChild(opt);
        });
      });

      // Default selections: USD → EUR
      fromSelect.value = "USD";
      toSelect.value   = "EUR";
    }

    /* ──────────────────────────────────────────────────────────────
       BUILD QUICK-PAIR BUTTONS
    ────────────────────────────────────────────────────────────── */
    function buildQuickPairs() {
      QUICK_PAIRS.forEach(({ from, to }) => {
        const btn = document.createElement("button");
        btn.className   = "pair-btn";
        btn.textContent = `${CURRENCIES[from].flag} ${from} → ${CURRENCIES[to].flag} ${to}`;
        btn.addEventListener("click", () => {
          fromSelect.value = from;
          toSelect.value   = to;
          triggerConvert();
        });
        quickPairs.appendChild(btn);
      });
    }

    /* ──────────────────────────────────────────────────────────────
       FETCH RATES
       Uses the free Frankfurter API (https://www.frankfurter.app).
       Caches the result so repeat conversions with the same base
       currency don't need another network request.
    ────────────────────────────────────────────────────────────── */
    async function fetchRates(base) {
      /* Return cached result if available */
      if (ratesCache[base]) return ratesCache[base];

      const url = `https://api.frankfurter.app/latest?from=${base}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`API error: ${response.status}`);

      const data = await response.json();
      /* data.rates does NOT include the base currency itself, so we add it */
      ratesCache[base] = { ...data.rates, [base]: 1 };
      return ratesCache[base];
    }

    /* ──────────────────────────────────────────────────────────────
       CONVERT
       Main conversion logic: fetch rates, compute result, update UI.
    ────────────────────────────────────────────────────────────── */
    async function convert() {
      const amount = parseFloat(amountInput.value);
      const from   = fromSelect.value;
      const to     = toSelect.value;

      /* Validate amount */
      if (isNaN(amount) || amount < 0) {
        showError("Please enter a valid positive number.");
        return;
      }
      hideError();
      setLoading(true);

      try {
        const rates = await fetchRates(from);

        if (!(to in rates)) {
          throw new Error(`No rate available for ${to}.`);
        }

        const rate      = rates[to];
        const converted = amount * rate;

        /* Format the result: use integer for large numbers, decimals otherwise */
        const formatted = formatNumber(converted, to);

        resultAmount.textContent = `${CURRENCIES[to].flag} ${formatted} ${to}`;
        resultRate.textContent   = `1 ${from} = ${rate.toFixed(4)} ${to}`;
        lastUpdated.textContent  = `Updated ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        showError(`Could not fetch rates. ${err.message}`);
        resultAmount.textContent = "—";
        resultRate.textContent   = "";
      } finally {
        setLoading(false);
      }
    }

    /* ──────────────────────────────────────────────────────────────
       FORMAT NUMBER
       Adds locale-aware thousands separators and sensible decimals.
    ────────────────────────────────────────────────────────────── */
    function formatNumber(value, currencyCode) {
      /* Currencies that are typically displayed without decimals */
      const noDecimals = ["JPY", "KRW", "IDR", "HUF", "CLP", "VND"];
      const decimals   = noDecimals.includes(currencyCode) ? 0 : 2;
      return value.toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });
    }

    /* ──────────────────────────────────────────────────────────────
       UI HELPERS
    ────────────────────────────────────────────────────────────── */

    /* Show/hide the loading spinner inside the result box */
    function setLoading(on) {
      resultBox.classList.toggle("loading", on);
    }

    /* Show an error banner */
    function showError(msg) {
      errorMsg.textContent = `⚠️ ${msg}`;
      errorMsg.classList.add("show");
    }

    /* Hide the error banner */
    function hideError() {
      errorMsg.classList.remove("show");
    }

    /* ──────────────────────────────────────────────────────────────
       DEBOUNCED TRIGGER
       Waits 350 ms after the last input event before converting,
       preventing excessive API calls while the user types.
    ────────────────────────────────────────────────────────────── */
    function triggerConvert() {
      clearTimeout(fetchTimer);
      fetchTimer = setTimeout(convert, 350);
    }

    /* ──────────────────────────────────────────────────────────────
       EVENT LISTENERS
    ────────────────────────────────────────────────────────────── */

    /* Re-convert whenever amount or either currency changes */
    amountInput.addEventListener("input",  triggerConvert);
    fromSelect .addEventListener("change", triggerConvert);
    toSelect   .addEventListener("change", triggerConvert);

    /* Swap button: swap "from" and "to", then re-convert */
    swapBtn.addEventListener("click", () => {
      const tmp        = fromSelect.value;
      fromSelect.value = toSelect.value;
      toSelect.value   = tmp;
      /* Also clear cached rates so the new base is fetched fresh */
      triggerConvert();
    });

    /* ──────────────────────────────────────────────────────────────
       INITIALISE
    ────────────────────────────────────────────────────────────── */
    buildSelects();      // populate <select> elements
    buildQuickPairs();   // populate quick-pair buttons
    convert();           // run first conversion on page load
  </script>

</body>
</html>
